name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  check:
    uses: ./.github/workflows/pr-check.yml

  build-backend:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.meta.outputs.image_sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKER_USER }}/talaka-backend:sha-${{ github.sha }}
            ${{ vars.DOCKER_USER }}/talaka-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Set image output
        id: meta
        run: echo "image_sha=${{ vars.DOCKER_USER }}/talaka-backend:sha-${{ github.sha }}" >> $GITHUB_OUTPUT

  build-frontend:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.meta.outputs.image_sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.DOCKER_USER }}/talaka-frontend:sha-${{ github.sha }}
            ${{ vars.DOCKER_USER }}/talaka-frontend:latest
          build-args: |
            VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Set image output
        id: meta
        run: echo "image_sha=${{ vars.DOCKER_USER }}/talaka-frontend:sha-${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/talaka
            touch .env
            sed -i '/^BACKEND_IMAGE=/d' .env
            sed -i '/^FRONTEND_IMAGE=/d' .env
            echo "BACKEND_IMAGE=${{ needs.build-backend.outputs.image_sha }}" >> .env
            echo "FRONTEND_IMAGE=${{ needs.build-frontend.outputs.image_sha }}" >> .env
            docker compose pull backend frontend
            docker compose up -d backend frontend

  notify:
    needs: [check, build-backend, build-frontend, deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      check_result: ${{ needs.check.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit
