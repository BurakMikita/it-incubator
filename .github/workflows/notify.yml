name: Notify Telegram

on:
  workflow_call:
    inputs:
      check_result:
        required: true
        type: string
      deploy_result:
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CHECKS="${{ inputs.check_result }}"
          DEPLOY="${{ inputs.deploy_result }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NL=$'\n'

          INFO="🔖 <code>${SHORT_SHA}</code> ${COMMIT_MSG}${NL}👤 ${{ github.actor }} → <code>${{ github.ref_name }}</code>"
          LINK="🔗 <a href=\"${RUN_URL}\">Открыть в Actions</a>"

          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ <b>Тесты упали</b>${NL}${INFO}${NL}${LINK}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ <b>Деплой упал</b>${NL}${INFO}${NL}${LINK}"
          else
            TEXT="✅ <b>Деплой успешен</b>${NL}${INFO}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$CHAT_ID" \
              --arg text "$TEXT" \
              '{chat_id: $chat_id, parse_mode: "HTML", text: $text, disable_web_page_preview: true}')"
